<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Item</title>
</head>
<body>
    <h2>Welcome to Lab 15</h2>

    <!-- CREATE FORM -->
    <form id="itemform">
        <input type="text" id="name" placeholder="Name" required>
        <input type="number" id="price" placeholder="Price" required>
        <button type="submit">Submit</button>
    </form>

    <p id="response"></p>

    <h3>Items:</h3>
    <ul id="itemslist"></ul>

    <!-- UPDATE SECTION -->
    <section id="updatesection" style="display: none;">
        <h3>Update Item</h3>
        <input type="hidden" id="updateID">
        <label>
         Name: <input type = "text" id = "updateName">
         </label>
        
         <label>
            Price: <input type="text" id="updatePrice">
         </label>

         <button onclick="updateItem()">SAVE UPDATE</button>
    </section>

    <script>
        // CREATE ITEM
        document.querySelector("#itemform").addEventListener("submit", async function (e) {
            e.preventDefault();

            const name = document.querySelector("#name").value;
            const price = document.querySelector("#price").value;

            try {
                const res = await fetch("/items", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        name: name,
                        price: Number(price)
                    })
                });

                const data = await res.json();

                document.querySelector('#response').innerHTML =
                    "Response: " + JSON.stringify(data);

                loadItems();

            } catch (error) {
                document.querySelector('#response').innerHTML =
                    "Response: ERROR " + error;
            }
        });

        // LOAD ITEMS
        async function loadItems() {
            const res = await fetch("/items");
            const data = await res.json();

            const list = document.querySelector("#itemslist");
            list.innerHTML = "";

            for (const id in data) {
                const item = data[id];

                const li = document.createElement("li");
                li.innerHTML = `
                    ID: ${id} | Name: ${item.name} | Price: ${item.price}
                    <button onclick ="showUpdateForm('${id}', '${item.name}', '${item.price}')">Update</button>
                    <button onclick = "deleteitem"('{id}')"> Delete </button>
                `;

                list.appendChild(li);
            }
        }

        // SHOW UPDATE FORM
        function showUpdateForm(id, name, price) {
            document.querySelector("#updatesection").style.display = "block";
            document.querySelector("#updateID").value = id;
            document.querySelector("#updateName").value = name;
            document.querySelector("#updatePrice").value = price;
        }

        // UPDATE ITEM
        async function updateItem() {
            const id = document.querySelector("#updateID").value;
            const name = document.querySelector("#updateName").value;
            const price = document.querySelector("#updatePrice").value;

            const res = await fetch(`/items/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name: name,
                    price: Number(price)
                })
            });

            const data = await res.json();

            document.querySelector("#response").innerHTML =
                "Updated: " + JSON.stringify(data);

            document.querySelector("#updatesection").style.display = "none";

            loadItems();
        }

        // function to remove an item
        async function deleteitem(id) {
            const res = await fetch(http://127.0.0.1:5000/items)
        }
        loadItems();
    </script>
</body>
</html>
