<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flask App</title>
    <link rel="stylesheet" href="../static/style.css"
</head>
<body>
    <h1 class="title">Ian Martinez </h1>
    <h2 class="subtitle"> Welcome to Flask! {{username}}</h2>
    <figure>
        <img src="{{ url_for('static', filename='Field.jpg' )}}" alt="image of a field">
    </figure>
    <h2 class="subtitle">Lists:</h2>
        {% for i in listfruits %}
        <p>{{i}}</p>
        {% endfor %}
        <h3> Check if {{f}} is in the list</h3>
        {% if f in listfruits %}
        <p> class ="instock"> Great! We have {{f}} in stock! </p>
        {% else %}
        <p class="outstock"> {{f}} is not in the list</p>
        {% endif %}

</body>
</html>
